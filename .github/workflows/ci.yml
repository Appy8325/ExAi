# CI — runs on every push to master/main/develop and on PRs to master/main.
#
# All deploys (Vercel + Railway/Render) read this status check before
# promoting changes; required check name: "Lint & Typecheck" (and "Test").
#
# Recommended deploy path:
#   - Vercel for apps/web  -> deploy-web.yml
#   - Railway / Render for apps/api and apps/worker
#     (auto-deploy on push via GitHub integration by default; or
#      deploy-{api,worker}-railway.yml for CI-driven redeploys)
#
# The two docker-build jobs at the bottom of this file are portability
# smoke tests: they verify the apps still produce a valid image so that
# any future enterprise target (Railway / Render / AWS ECS) can build
# from apps/api/Dockerfile or apps/worker/Dockerfile unchanged. They do
# NOT push to any registry.
name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: concourse_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          API_DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      - run: pnpm test
        env:
          API_DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

  build-docker-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t concourse-api -f apps/api/Dockerfile .

  build-docker-worker:
    name: Build Worker Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t concourse-worker -f apps/worker/Dockerfile .
