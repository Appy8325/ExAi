# Production Supabase project configuration for ExAi (Concourse).
# Apply via: supabase link --project-ref <ref> && supabase push

project_id = "exai-production"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]

[db]
major_version = 15

[db.pooler]
enabled = true
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://exai.app"
additional_redirect_urls = ["https://exai.app/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_confirmations = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[realtime]
enabled = true
